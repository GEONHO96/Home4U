name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend · Gradle test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Home4u-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run tests (H2 프로파일 기본)
        run: ./gradlew test --no-daemon

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: Home4u-backend/build/reports/tests/test
          if-no-files-found: ignore

  mobile-test:
    name: Mobile · vitest (toastStore / app.config 단위 테스트)
    runs-on: ubuntu-latest
    # PR 코멘트 작성 권한 — GITHUB_TOKEN 기본값은 read-only 라 명시 필요
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: home4u-app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: home4u-app/package-lock.json

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Vitest (단위 테스트 + coverage 임계값)
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: home4u-app/coverage
          if-no-files-found: ignore

      # PR 단계에서만 base (= main) 의 mobile-coverage 아티팩트를 받아 diff 생성.
      # main 푸시 / 첫 PR 일 때 base 가 비어있으면 coverage diff step 은 silent skip.
      - name: Fetch base coverage (PR)
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci.yml
          branch: ${{ github.event.pull_request.base.ref }}
          name: mobile-coverage
          path: .coverage-base
        continue-on-error: true

      - name: Compute coverage diff (PR · totals + hot files)
        id: cov-diff
        if: github.event_name == 'pull_request'
        run: node scripts/coverage-diff.mjs
        shell: bash

      # marocchino/sticky-pull-request-comment 가 같은 header 로 코멘트 1개를 유지 (push 마다 spam X)
      - name: Post / update coverage comment (PR)
        if: github.event_name == 'pull_request' && hashFiles('home4u-app/cov-comment.md') != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: mobile-coverage
          path: home4u-app/cov-comment.md
        continue-on-error: true

  frontend-build:
    name: Frontend · tsc + vite build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Home4u-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Home4u-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Production build
        run: npm run build
        env:
          # Sentry release 태깅 — 토큰이 시크릿에 있으면 자동 sourcemap 업로드.
          # 미설정 시 vite.config.ts 의 sentryVitePlugin 이 silent.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_RELEASE: ${{ github.sha }}
          # 런타임에 emit 되는 이벤트도 같은 release 로 묶이도록 build-time inject
          VITE_SENTRY_RELEASE: ${{ github.sha }}

      - name: Upload dist (optional)
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Home4u-frontend/dist
          if-no-files-found: ignore

  e2e:
    name: Frontend · Playwright e2e (smoke)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    defaults:
      run:
        working-directory: Home4u-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Home4u-frontend/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Install web deps
        run: npm ci

      - name: Restore axe scan cache
        # 같은 page key (path + DOM length + tags) 가 다른 빌드에서 재진입할 때 axe 호출(~1s) 절감.
        # cache miss 여도 e2e 는 정상 동작 — 그저 모든 시나리오가 fresh scan 일 뿐.
        uses: actions/cache@v4
        with:
          path: Home4u-frontend/e2e/.axe-cache
          key: axe-cache-${{ runner.os }}-${{ hashFiles('Home4u-frontend/src/**/*.{ts,tsx,css}') }}
          restore-keys: |
            axe-cache-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start backend (dev profile, H2 in-memory)
        working-directory: Home4u-backend
        run: |
          chmod +x ./gradlew
          SPRING_PROFILES_ACTIVE=dev nohup ./gradlew bootRun --no-daemon > backend.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -fs -o /dev/null -X POST http://localhost:8080/users/login -H 'Content-Type: application/json' -d '{}' || curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/v3/api-docs | grep -qE '^[23]'; then
              echo "backend up"; break; fi
            sleep 2
          done

      - name: Run Playwright smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Home4u-frontend/playwright-report
          if-no-files-found: ignore

  integration:
    name: Backend · Testcontainers MySQL (Flyway V1∼V3)
    runs-on: ubuntu-latest
    needs: [backend-test]
    defaults:
      run:
        working-directory: Home4u-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run Testcontainers integration tests
        env:
          RUN_INTEGRATION: 'true'
        run: ./gradlew test --tests "com.piko.home4u.integration.*" --no-daemon

      - name: Upload integration test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report
          path: Home4u-backend/build/reports/tests/test
          if-no-files-found: ignore

  lighthouse:
    name: Frontend · Lighthouse CI
    runs-on: ubuntu-latest
    needs: [frontend-build]
    defaults:
      run:
        working-directory: Home4u-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Home4u-frontend/package-lock.json

      - name: Install web deps
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Save current scores to .lighthouseci-current
        if: always()
        run: |
          # 비교 추세를 위해 현재 빌드 점수를 임시 디렉토리에 보관 (artifact 로 끌어쓸 수도 있음)
          mkdir -p .lighthouseci-current
        shell: bash

      - name: Fetch base branch scores (PR — base 브랜치)
        id: lhci-base-pr
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci.yml
          branch: ${{ github.event.pull_request.base.ref }}
          name: lighthouse-report
          path: .lighthouseci-base
        continue-on-error: true

      - name: Verify base artifact has lhr-*.json
        id: lhci-base-check
        if: always()
        # OS-agnostic: bash test 와 ls glob 대신 node 의 fs 로 처리 — Windows runner / fish shell 등에서도 동일하게 동작
        run: |
          node -e "
            const fs = require('fs');
            const path = '.lighthouseci-base';
            let has = false;
            if (fs.existsSync(path)) {
              try {
                has = fs.readdirSync(path).some((f) => /^lhr-.*\.json$/.test(f));
              } catch { has = false; }
            }
            if (!has) {
              try { fs.rmSync(path, { recursive: true, force: true }); } catch { /* noop */ }
            }
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'has_base=' + (has ? '1' : '0') + '\n');
          "
        shell: bash

      - name: Fetch latest main scores (PR base 비었거나 push 이벤트일 때)
        if: steps.lhci-base-check.outputs.has_base == '0'
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci.yml
          branch: main
          name: lighthouse-report
          path: .lighthouseci-base
        continue-on-error: true

      - name: Run Lighthouse CI
        id: lhci
        run: npx --yes @lhci/cli@0.14.x autorun --config=./lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Summarize scores for webhook
        if: always()
        id: lhci-summary
        run: |
          set -e
          if [ ! -d ".lighthouseci" ]; then
            echo "summary=Lighthouse CI did not produce a report" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LATEST=$(ls -1 .lighthouseci/lhr-*.json 2>/dev/null | tail -1 || true)
          if [ -z "$LATEST" ]; then
            echo "summary=No lhr-*.json found" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          export LHR="$LATEST"
          # base 브랜치 점수가 있으면 추세(diff) 표시
          BASE_LHR=""
          if [ -d "../.lighthouseci-base" ]; then
            B=$(ls -1 ../.lighthouseci-base/lhr-*.json 2>/dev/null | tail -1 || true)
            [ -n "$B" ] && BASE_LHR="$B"
          fi
          export BASE_LHR
          node -e "
            const r = require(process.env.LHR);
            const base = process.env.BASE_LHR ? require(process.env.BASE_LHR) : null;
            const c = r.categories;
            const bc = base?.categories;
            const TH = { performance: 0.70, accessibility: 0.90, 'best-practices': 0.85, seo: 0.80 };
            const LABEL = { performance: 'perf', accessibility: 'a11y', 'best-practices': 'bp', seo: 'seo' };
            const trend = (cur, prev) => {
              if (prev == null) return '';
              const d = Math.round(cur * 100) - Math.round(prev * 100);
              if (d > 0) return ' ▲' + d;
              if (d < 0) return ' ▼' + Math.abs(d);
              return ' =';
            };
            const parts = [];
            const fails = [];
            for (const k of Object.keys(TH)) {
              const score = c[k]?.score ?? 0;
              const prev = bc ? bc[k]?.score : null;
              const pct = Math.round(score * 100);
              const ok = score >= TH[k];
              parts.push((ok ? '✅' : '🚨') + ' ' + LABEL[k] + ' ' + pct + trend(score, prev));
              if (!ok) fails.push(LABEL[k] + ' ' + pct + ' < ' + Math.round(TH[k] * 100));
            }
            const head = fails.length === 0 ? '🟢 Lighthouse OK' : '🔴 Lighthouse FAIL — ' + fails.join(', ');
            const baseTag = bc ? ' (vs base)' : '';
            const summary = head + baseTag + ' · ' + parts.join(' · ');
            require('fs').appendFileSync(process.env.GITHUB_OUTPUT, 'summary=' + summary + '\n');
            require('fs').appendFileSync(process.env.GITHUB_OUTPUT, 'failed=' + (fails.length > 0 ? '1' : '0') + '\n');
          "

      - name: Notify Slack/Discord (optional)
        if: always() && (env.SLACK_WEBHOOK_URL != '' || env.DISCORD_WEBHOOK_URL != '')
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SUMMARY: ${{ steps.lhci-summary.outputs.summary }}
          SHA: ${{ github.sha }}
          PR: ${{ github.event.pull_request.html_url || github.event.head_commit.url }}
        run: |
          set -e
          MSG="📊 ${SUMMARY:-(no summary)} · ${SHA:0:7} · ${PR:-no-link}"
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -fsS -X POST -H 'Content-Type: application/json' \
              -d "{\"text\":\"${MSG}\"}" "$SLACK_WEBHOOK_URL" || true
          fi
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -fsS -X POST -H 'Content-Type: application/json' \
              -d "{\"content\":\"${MSG}\"}" "$DISCORD_WEBHOOK_URL" || true
          fi

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: Home4u-frontend/.lighthouseci
          if-no-files-found: ignore

  # OS-agnostic 베이스 verify 스크립트의 모든 GitHub-hosted runner OS 회귀 — bash + node fs.readdirSync 경로
  # 처리가 디렉토리 구분자/glob 동작 차이 없이 동일하게 작동하는지 검증. LHCI 본체는 ubuntu 만 돌린다.
  # macos-latest 가 추가되면서 어떤 OS 가 실패해도 다른 OS 결과는 보존되도록 fail-fast 비활성화.
  #
  # macos runner 는 분당 8x 비용 → PR 마다 도는 건 비싸다. push (main / 릴리즈) 시점에만 매트릭스에 포함하고
  # PR 은 ubuntu/windows 만 실행 — fromJSON 으로 이벤트 별 매트릭스 분기.
  lighthouse-script-os-smoke:
    name: Frontend · Lighthouse verify (${{ matrix.os }} smoke)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest","windows-latest"]') || fromJSON('["ubuntu-latest","windows-latest","macos-latest"]') }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify base 디렉토리 + lhr-*.json 케이스
        run: |
          mkdir -p .lighthouseci-base
          # 합성 lhr-*.json 1개 — has_base=1 이 나와야 함
          echo '{"categories":{}}' > .lighthouseci-base/lhr-synthetic.json
          : > out.tmp
          GITHUB_OUTPUT=$(pwd)/out.tmp node -e "
            const fs = require('fs');
            const path = '.lighthouseci-base';
            let has = false;
            if (fs.existsSync(path)) {
              try { has = fs.readdirSync(path).some((f) => /^lhr-.*\.json$/.test(f)); }
              catch { has = false; }
            }
            if (!has) { try { fs.rmSync(path, { recursive: true, force: true }); } catch {} }
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'has_base=' + (has ? '1' : '0') + '\n');
          "
          cat out.tmp
          grep -q '^has_base=1$' out.tmp || { echo 'FAIL: lhr-*.json 있는데 has_base=1 이 아님'; exit 1; }
        shell: bash

      - name: Verify 빈 base 디렉토리 케이스
        run: |
          rm -rf .lighthouseci-base
          mkdir -p .lighthouseci-base
          # lhr-*.json 없음 — has_base=0 이 나와야 함 + 디렉토리 자동 삭제
          : > out.tmp
          GITHUB_OUTPUT=$(pwd)/out.tmp node -e "
            const fs = require('fs');
            const path = '.lighthouseci-base';
            let has = false;
            if (fs.existsSync(path)) {
              try { has = fs.readdirSync(path).some((f) => /^lhr-.*\.json$/.test(f)); }
              catch { has = false; }
            }
            if (!has) { try { fs.rmSync(path, { recursive: true, force: true }); } catch {} }
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'has_base=' + (has ? '1' : '0') + '\n');
          "
          cat out.tmp
          grep -q '^has_base=0$' out.tmp || { echo 'FAIL: 빈 디렉토리인데 has_base=0 이 아님'; exit 1; }
          [ ! -d .lighthouseci-base ] || { echo 'FAIL: 빈 base 디렉토리가 자동 삭제되지 않음'; exit 1; }
        shell: bash

      - name: Verify 디렉토리 자체가 없는 케이스
        run: |
          rm -rf .lighthouseci-base
          : > out.tmp
          GITHUB_OUTPUT=$(pwd)/out.tmp node -e "
            const fs = require('fs');
            const path = '.lighthouseci-base';
            let has = false;
            if (fs.existsSync(path)) {
              try { has = fs.readdirSync(path).some((f) => /^lhr-.*\.json$/.test(f)); }
              catch { has = false; }
            }
            if (!has) { try { fs.rmSync(path, { recursive: true, force: true }); } catch {} }
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'has_base=' + (has ? '1' : '0') + '\n');
          "
          cat out.tmp
          grep -q '^has_base=0$' out.tmp || { echo 'FAIL: 미존재 디렉토리인데 has_base=0 이 아님'; exit 1; }
        shell: bash
