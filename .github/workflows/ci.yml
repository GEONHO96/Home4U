name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend · Gradle test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Home4u-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run tests (H2 프로파일 기본)
        run: ./gradlew test --no-daemon

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: Home4u-backend/build/reports/tests/test
          if-no-files-found: ignore

  frontend-build:
    name: Frontend · tsc + vite build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Home4u-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Home4u-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check + production build
        run: npm run build

      - name: Upload dist (optional)
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Home4u-frontend/dist
          if-no-files-found: ignore
