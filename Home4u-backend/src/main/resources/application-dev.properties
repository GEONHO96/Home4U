# =========================
# Home4U 개발 프로파일 (H2 In-Memory)
# 실행: ./gradlew bootRun  (기본 프로파일)
# =========================

# H2 DataSource
spring.datasource.url=jdbc:h2:mem:home4u;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Web Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# 매번 깨끗한 스키마 (인메모리라 어차피 재기동 시 초기화됨)
spring.jpa.hibernate.ddl-auto=create-drop
