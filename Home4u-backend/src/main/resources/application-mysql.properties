# =========================
# Home4U MySQL 프로파일
# 실행: SPRING_PROFILES_ACTIVE=mysql ./gradlew bootRun
#
# 사전 요구:
#   1. MySQL 설치/기동
#   2. 데이터베이스 생성
#      CREATE DATABASE home4u CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
#   3. 환경변수 설정 (필수)
#      export MYSQL_USER=root
#      export MYSQL_PASSWORD=<your-password>
#
#   MYSQL_PASSWORD 는 기본값을 두지 않는다 (노출 방지).
#   미설정으로 실행하면 DataSource 초기화 단계에서 실패한다.
# =========================

spring.datasource.url=jdbc:mysql://localhost:3306/home4u?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
