# =========================
# Home4U MySQL 프로파일
# 실행: SPRING_PROFILES_ACTIVE=mysql ./gradlew bootRun
#
# 사전 요구:
#   1. MySQL 설치/기동
#   2. 데이터베이스 생성
#      CREATE DATABASE home4u CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
#   3. 환경변수 설정 (필수)
#      export MYSQL_USER=root
#      export MYSQL_PASSWORD=<your-password>
#
#   MYSQL_PASSWORD 는 기본값을 두지 않는다 (노출 방지).
#   미설정으로 실행하면 DataSource 초기화 단계에서 실패한다.
# =========================

spring.datasource.url=jdbc:mysql://localhost:3306/home4u?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Flyway — 운영용 스키마 마이그레이션. JPA 의 ddl-auto 는 validate 로 내려서
# Flyway 가 단일 진실 공급원이 되게 한다.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.jpa.hibernate.ddl-auto=validate

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
