# =========================
# Home4U MySQL 프로파일
# 실행: ./gradlew bootRun --args='--spring.profiles.active=mysql'
#   또는 SPRING_PROFILES_ACTIVE=mysql ./gradlew bootRun
# 사전 요구:
#   - MySQL 설치/기동
#   - 데이터베이스 생성: CREATE DATABASE home4u CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
#   - 환경변수 MYSQL_USER, MYSQL_PASSWORD 설정 (없으면 기본값 사용)
# =========================

spring.datasource.url=jdbc:mysql://localhost:3306/home4u?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:rjsgh!@#8079}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
