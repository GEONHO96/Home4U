# =========================
# Home4U 공통 설정
# =========================
spring.application.name=Home4U
server.port=8080

# 기본 프로파일 (H2 인메모리, 설치 없이 개발 가능)
# MySQL로 실행하려면 -Dspring.profiles.active=mysql 또는 환경변수 SPRING_PROFILES_ACTIVE=mysql
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# =========================
# JPA 공통
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =========================
# JWT
# =========================
# 기본 시크릿 (개발용). 운영에서는 반드시 환경변수 JWT_SECRET 으로 오버라이드.
jwt.secret=${JWT_SECRET:home4u-dev-secret-key-please-change-in-production-min-256bit}
jwt.expiration=3600000

# =========================
# OAuth (환경변수 우선, 없으면 원래 값 유지)
# =========================
naver.client.id=${NAVER_CLIENT_ID:q7higb27zy}
naver.client.secret=${NAVER_CLIENT_SECRET:jAafyv6bc82doASJaBDHa42FYZG8NQTis2So5miC}

# =========================
# OpenAI (ChatGPT 챗봇용, 선택)
# =========================
openai.api.key=${OPENAI_API_KEY:}

# =========================
# CORS
# =========================
cors.allowed-origins=*

# =========================
# 시간대
# =========================
spring.jackson.time-zone=Asia/Seoul

# =========================
# 로깅
# =========================
logging.level.org.springframework=INFO
logging.level.com.piko.home4u=DEBUG
logging.level.org.hibernate.SQL=DEBUG
