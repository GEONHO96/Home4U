# =========================
# Home4U 공통 설정
# =========================
spring.application.name=Home4U
server.port=8080

# 기본 프로파일 (H2 인메모리, 설치 없이 개발 가능)
# MySQL로 실행하려면 -Dspring.profiles.active=mysql 또는 환경변수 SPRING_PROFILES_ACTIVE=mysql
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# =========================
# JPA 공통
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =========================
# JWT
# =========================
# 개발용 기본 시크릿 (로컬 한정). 운영에서는 반드시 환경변수 JWT_SECRET 으로 오버라이드.
# - 실 서비스 운영 시 256bit 이상의 랜덤 값으로 교체할 것.
jwt.secret=${JWT_SECRET:home4u-dev-secret-key-please-change-in-production-min-256bit}
jwt.expiration=3600000

# =========================
# OAuth (환경변수 필수)
# - NAVER_CLIENT_ID / NAVER_CLIENT_SECRET 미설정 시 OAuth 흐름만 비활성,
#   그 외 기본 기능(회원가입/로그인/매물/거래 등)은 정상 동작한다.
# - 참고: 이 프로젝트의 히스토리(~ec22906)에 구 client secret 이 노출됐던 이력이
#   있으므로, 운영 환경이라면 네이버 개발자 센터에서 시크릿을 반드시 로테이션할 것.
# =========================
naver.client.id=${NAVER_CLIENT_ID:}
naver.client.secret=${NAVER_CLIENT_SECRET:}

# =========================
# OpenAI (ChatGPT 챗봇용, 선택)
# =========================
openai.api.key=${OPENAI_API_KEY:}

# =========================
# CORS
# =========================
cors.allowed-origins=*

# =========================
# 시간대
# =========================
spring.jackson.time-zone=Asia/Seoul

# =========================
# 로깅
# =========================
logging.level.org.springframework=INFO
logging.level.com.piko.home4u=DEBUG
logging.level.org.hibernate.SQL=DEBUG
