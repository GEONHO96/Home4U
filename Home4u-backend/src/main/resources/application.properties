# =========================
# Home4U 공통 설정
# =========================
spring.application.name=Home4U
server.port=8080

# 기본 프로파일 (H2 인메모리, 설치 없이 개발 가능)
# MySQL로 실행하려면 -Dspring.profiles.active=mysql 또는 환경변수 SPRING_PROFILES_ACTIVE=mysql
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# =========================
# JPA 공통
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway — 기본 비활성. mysql 프로파일에서만 활성화 (application-mysql.properties)
spring.flyway.enabled=false

# =========================
# Actuator
# =========================
# health/info/prometheus 만 노출 — 그 외 운영 엔드포인트는 노출 자체를 차단.
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.info.env.enabled=true
info.app.name=Home4U
info.app.description=부동산 매물 거래 플랫폼

# =========================
# JWT
# =========================
# 개발용 기본 시크릿 (로컬 한정). 운영에서는 반드시 환경변수 JWT_SECRET 으로 오버라이드.
# - 실 서비스 운영 시 256bit 이상의 랜덤 값으로 교체할 것.
jwt.secret=${JWT_SECRET:home4u-dev-secret-key-please-change-in-production-min-256bit}
jwt.expiration=3600000

# =========================
# OAuth (환경변수 필수 — 미설정 시 소셜 로그인 버튼이 "미설정" 상태로 비활성)
# 공통 redirect-uri 기본값은 로컬 Vite dev 서버 경로를 가리킨다.
# - 참고: 이 프로젝트의 히스토리(~ec22906)에 구 client secret 이 노출됐던 이력이
#   있으므로, 운영 환경이라면 네이버 개발자 센터에서 시크릿을 반드시 로테이션할 것.
# =========================
oauth.google.client-id=${OAUTH_GOOGLE_CLIENT_ID:}
oauth.google.client-secret=${OAUTH_GOOGLE_CLIENT_SECRET:}
oauth.google.redirect-uri=${OAUTH_GOOGLE_REDIRECT_URI:http://localhost:5173/oauth/google/callback}

oauth.kakao.client-id=${OAUTH_KAKAO_CLIENT_ID:}
oauth.kakao.client-secret=${OAUTH_KAKAO_CLIENT_SECRET:}
oauth.kakao.redirect-uri=${OAUTH_KAKAO_REDIRECT_URI:http://localhost:5173/oauth/kakao/callback}

oauth.naver.client-id=${OAUTH_NAVER_CLIENT_ID:${NAVER_CLIENT_ID:}}
oauth.naver.client-secret=${OAUTH_NAVER_CLIENT_SECRET:${NAVER_CLIENT_SECRET:}}
oauth.naver.redirect-uri=${OAUTH_NAVER_REDIRECT_URI:http://localhost:5173/oauth/naver/callback}

# 하위 호환 (기존 코드 참조) — 새 oauth.* 키를 써주세요
naver.client.id=${oauth.naver.client-id:}
naver.client.secret=${oauth.naver.client-secret:}

# =========================
# OpenAI (ChatGPT 챗봇용, 선택)
# =========================
openai.api.key=${OPENAI_API_KEY:}

# =========================
# CORS
# =========================
cors.allowed-origins=*

# =========================
# 시간대
# =========================
spring.jackson.time-zone=Asia/Seoul

# =========================
# 로깅
# =========================
logging.level.org.springframework=INFO
logging.level.com.piko.home4u=DEBUG
logging.level.org.hibernate.SQL=DEBUG
