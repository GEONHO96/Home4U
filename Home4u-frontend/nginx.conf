server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback - React Router 경로는 모두 index.html 로
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 정적 자원 장기 캐시
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # 백엔드 API 프록시 (/api/* → backend:8080/...)
    # Vite 빌드 산출물의 axiosInstance 는 http://localhost:8080 을 직접 부르기 때문에,
    # 같은 도메인에서 운영하려면 프론트 소스의 baseURL 을 '/api' 로 바꾸고 아래 프록시를 쓴다.
    # 이번 릴리스는 직접 호출 방식을 유지하므로 참고용으로만 남긴다.
    # location /api/ {
    #     proxy_pass http://backend:8080/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # }

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
